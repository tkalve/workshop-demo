<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧇 Waffle Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface2: #0f3460;
      --accent: #e94560;
      --accent2: #f5a623;
      --text: #eaeaea;
      --muted: #888;
      --system: #7ec8e3;
      --action: #b8e994;
      --radius: 10px;
      --font: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Join screen ── */
    #join-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px;
      background: var(--surface);
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
      width: min(420px, 95vw);
    }

    #join-screen h1 {
      font-size: 2.4rem;
      letter-spacing: -1px;
    }

    #join-screen p {
      color: var(--muted);
      font-size: .95rem;
      text-align: center;
    }

    #join-screen input {
      width: 100%;
      padding: 14px 18px;
      border-radius: var(--radius);
      border: 2px solid var(--surface2);
      background: var(--bg);
      color: var(--text);
      font-size: 1.1rem;
      outline: none;
      transition: border-color .2s;
    }
    #join-screen input:focus { border-color: var(--accent); }

    #join-error {
      color: var(--accent);
      font-size: .85rem;
      min-height: 1.2em;
    }

    button {
      cursor: pointer;
      font-family: var(--font);
      font-size: 1rem;
      border: none;
      border-radius: var(--radius);
      transition: filter .15s, transform .1s;
    }
    button:active { transform: scale(.97); }
    button:hover  { filter: brightness(1.15); }

    #btn-join {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* ── Chat screen ── */
    #chat-screen {
      display: none;
      flex-direction: column;
      width: min(720px, 100vw);
      height: 100dvh;
      background: var(--surface);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--surface2);
      border-bottom: 2px solid var(--bg);
      flex-shrink: 0;
    }

    header h2 { font-size: 1.3rem; }
    #header-nick {
      font-size: .85rem;
      color: var(--accent2);
      background: rgba(245,166,35,.12);
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* ── Message list ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: fadeIn .18s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } }

    .msg.own { align-self: flex-end; }
    .msg.other { align-self: flex-start; }

    .msg-meta {
      font-size: .72rem;
      color: var(--muted);
      margin-bottom: 2px;
      padding: 0 4px;
    }
    .msg.own .msg-meta { text-align: right; }

    .msg-bubble {
      padding: 9px 14px;
      border-radius: 14px;
      font-size: .95rem;
      line-height: 1.45;
      word-break: break-word;
    }

    .msg.own  .msg-bubble { background: var(--accent);  color: #fff; border-bottom-right-radius: 4px; }
    .msg.other .msg-bubble { background: var(--surface2); border-bottom-left-radius: 4px; }

    /* system / action messages */
    .sys-line {
      text-align: center;
      font-size: .82rem;
      color: var(--system);
      padding: 4px 0;
      animation: fadeIn .18s ease;
    }
    .action-line {
      text-align: center;
      font-size: .88rem;
      font-style: italic;
      color: var(--action);
      padding: 3px 0;
      animation: fadeIn .18s ease;
    }

    /* ── Input bar ── */
    #input-bar {
      display: flex;
      gap: 10px;
      padding: 14px 16px;
      border-top: 2px solid var(--bg);
      background: var(--surface2);
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      padding: 11px 16px;
      border-radius: var(--radius);
      border: 2px solid var(--bg);
      background: var(--bg);
      color: var(--text);
      font-size: .97rem;
      outline: none;
      transition: border-color .2s;
    }
    #msg-input:focus { border-color: var(--accent); }

    #btn-send {
      padding: 11px 20px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      border-radius: var(--radius);
    }

    /* hint bar */
    #hint {
      font-size: .72rem;
      color: var(--muted);
      padding: 4px 20px 8px;
      background: var(--surface2);
      flex-shrink: 0;
    }

    /* scrollbar */
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ── Join Screen ── -->
<section id="join-screen">
  <h1>🧇 Waffle</h1>
  <p>A cozy little chat. Pick a nickname to join.</p>
  <input id="nick-input" type="text" maxlength="20" placeholder="YourNick" autocomplete="off" />
  <div id="join-error"></div>
  <button id="btn-join">Join the Waffle →</button>
</section>

<!-- ── Chat Screen ── -->
<section id="chat-screen">
  <header>
    <h2>🧇 Waffle <span style="color:var(--muted);font-weight:400;font-size:.9rem">#general</span></h2>
    <span id="header-nick"></span>
  </header>
  <div id="messages"></div>
  <div id="hint">Commands: <strong>/me &lt;action&gt;</strong> · <strong>/who [@nick]</strong> · <strong>/nick &lt;newNick&gt;</strong></div>
  <div id="input-bar">
    <input id="msg-input" type="text" placeholder="Say something… or try /me waves" autocomplete="off" />
    <button id="btn-send">Send</button>
  </div>
</section>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myNick = '';

  // ── Elements ──
  const joinScreen  = document.getElementById('join-screen');
  const chatScreen  = document.getElementById('chat-screen');
  const nickInput   = document.getElementById('nick-input');
  const joinError   = document.getElementById('join-error');
  const btnJoin     = document.getElementById('btn-join');
  const messages    = document.getElementById('messages');
  const msgInput    = document.getElementById('msg-input');
  const btnSend     = document.getElementById('btn-send');
  const headerNick  = document.getElementById('header-nick');

  // ── Join ──
  function doJoin() {
    const nick = nickInput.value.trim();
    if (!nick) return;
    joinError.textContent = '';
    socket.emit('join', { nick }, (res) => {
      if (res.error) {
        joinError.textContent = res.error;
        return;
      }
      myNick = nick;
      headerNick.textContent = myNick;
      joinScreen.style.display = 'none';
      chatScreen.style.display = 'flex';
      msgInput.focus();
    });
  }

  btnJoin.addEventListener('click', doJoin);
  nickInput.addEventListener('keydown', e => e.key === 'Enter' && doJoin());

  // ── Send ──
  function doSend() {
    const text = msgInput.value;
    if (!text.trim()) return;
    socket.emit('message', { text });
    msgInput.value = '';
  }

  btnSend.addEventListener('click', doSend);
  msgInput.addEventListener('keydown', e => e.key === 'Enter' && doSend());

  // ── Render helpers ──
  function ts(ms) {
    return new Date(ms).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function scrollBottom() {
    messages.scrollTop = messages.scrollHeight;
  }

  function appendSystem(html) {
    const el = document.createElement('div');
    el.className = 'sys-line';
    el.innerHTML = html;
    messages.appendChild(el);
    scrollBottom();
  }

  function appendAction(html) {
    const el = document.createElement('div');
    el.className = 'action-line';
    el.innerHTML = html;
    messages.appendChild(el);
    scrollBottom();
  }

  function appendMessage(nick, text, own) {
    const wrapper = document.createElement('div');
    wrapper.className = `msg ${own ? 'own' : 'other'}`;

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = own ? 'you' : nick;

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;  // plain text — no XSS

    wrapper.appendChild(meta);
    wrapper.appendChild(bubble);
    messages.appendChild(wrapper);
    scrollBottom();
  }

  // ── Socket events ──
  socket.on('message', ({ nick, text }) => {
    appendMessage(nick, text, nick === myNick);
  });

  socket.on('system', ({ text }) => {
    appendSystem(text);
  });

  socket.on('action', ({ nick, action }) => {
    // Escape action text to prevent XSS
    const safe = action.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    appendAction(`* <strong>${nick}</strong> ${safe}`);
  });

  socket.on('nick_changed', ({ nick }) => {
    myNick = nick;
    headerNick.textContent = nick;
  });
</script>
</body>
</html>
